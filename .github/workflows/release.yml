name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run migration tests
        run: |
          for test in tests/scripts/test-migration-*.sh; do
            echo "=== Running $test ==="
            /bin/bash "$test"
          done

      - name: Run discovery tests
        run: |
          for test in tests/scripts/test-discovery-*.cjs; do
            echo "=== Running $test ==="
            node --test "$test"
          done

      - name: Run workflow-manifest tests
        run: /bin/bash tests/scripts/test-workflow-manifest.sh

      - name: Run knowledge Node tests
        run: |
          for test in tests/scripts/test-knowledge-*.cjs; do
            echo "=== Running $test ==="
            node --test "$test"
          done

      - name: Run knowledge shell tests
        run: |
          for test in tests/scripts/test-knowledge-*.sh; do
            echo "=== Running $test ==="
            /bin/bash "$test"
          done

  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract release notes from tag annotation
        id: notes
        run: |
          TAG_MESSAGE=$(git tag -l --format='%(contents)' "$GITHUB_REF_NAME")
          {
            echo 'BODY<<EOF'
            echo "$TAG_MESSAGE"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.notes.outputs.BODY }}
